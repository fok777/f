name: Sync k40→ ging-tin

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo (full history)
        uses: actions/checkout@v4
        with:
          repository: cctv77/ging-tin
          token: ${{ secrets.cctv77 }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "cctv77-bot"
          git config user.email "cctv77@users.noreply.github.com"

      - name: Add target remote
        run: |
          git remote add target \
            https://x-access-token:${{ secrets.cctv1100 }}@github.com/cctv77/Ganten.git

      - name: Fetch k40 branch
        run: |
          git fetch origin k40
          git branch k40 origin/k40

      - name: Push k40 → ging-tin
        run: |
          git push target k40:k40 --force
