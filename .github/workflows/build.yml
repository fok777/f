name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Target Device Codename'
        required: true
        default: 'alioth'
        type: choice
        options:
          - alioth
          - apollo
          - cas
          - cmi
          - dagu
          - elish
          - enuma
          - lmi
          - munch
          - pipa
          - psyche
          - thyme
          - umi

      target_os:
        description: 'Target OS'
        required: true
        type: choice
        default: 'miui'
        options:
          - aosp
          - miui
          - both

      ksu:
        description: 'Enable KernelSU (ReSukiSU-SuSFS)'
        required: true
        type: boolean
        default: true

jobs:
  build:
    name: Build ${{ inputs.device }} | OS:${{ inputs.target_os }} | KSU:${{ inputs.ksu && 'On' || 'Off' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Cleanup Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc \
            "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex gawk \
            git gnupg gperf imagemagick libncurses-dev \
            lib32readline-dev lib32z1-dev liblz4-tool \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync \
            schedtool squashfs-tools xsltproc zip zlib1g-dev python3

      - name: Setup Cache (ccache)
        uses: actions/cache@v6
        with:
          path: ~/.cache/ccache_mikernel
          key: kernel-ccache-${{ inputs.device }}-${{ inputs.target_os }}-${{ github.run_id }}
          restore-keys: |
            kernel-ccache-${{ inputs.device }}-${{ inputs.target_os }}-
            kernel-ccache-${{ inputs.device }}-
            kernel-ccache-

      - name: Setup Toolchain (ZyC-Clang 16)
        run: |
          mkdir -p $HOME/zyc-clang
          cd $HOME/zyc-clang
          wget -q https://github.com/ZyCromerZ/Clang/releases/download/16.0.6-20260510-release/Clang-16.0.6-20260510.tar.gz
          tar -zxvf Clang-16.0.6-20260510.tar.gz

      - name: Build Kernel
        id: build
        run: |
          chmod +x build_kernel.sh
          LOG_FILE="build.log"

          ARGS="${{ inputs.device }}"
          if [ "${{ inputs.ksu }}" == "true" ]; then
            ARGS="$ARGS ksu"
          fi
          if [ "${{ inputs.target_os }}" != "both" ]; then
            ARGS="$ARGS ${{ inputs.target_os }}"
          fi

          echo ">>> ./build_kernel.sh $ARGS"
          ./build_kernel.sh $ARGS | tee $LOG_FILE

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Kernel-${{ inputs.device }}-${{ inputs.target_os }}-${{ inputs.ksu && 'KSU' || 'NoKSU' }}-${{ github.run_number }}
          path: |
            APTKernel_*.zip
            build.log
          if-no-files-found: error

      - name: Send Kernel & Log to Telegram
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          KERNEL_ZIP=$(find . -maxdepth 1 -name "APTKernel_*.zip" | head -n 1)
          LOG_FILE="build.log"
          RUN_ID=${{ github.run_id }}
          REPO_URL="https://github.com/${{ github.repository }}/actions/runs/$RUN_ID"

          if [ -z "$KERNEL_ZIP" ]; then
            echo "❌ Kernel zip not found"
            exit 1
          fi

          CAPTION="🚀 *Kernel Build Success*

          📱 *Device:* \`${{ inputs.device }}\`
          🖥️ *OS:* \`${{ inputs.target_os }}\`
          🧩 *KSU:* \`${{ inputs.ksu && 'ReSukiSU' || 'None' }}\`
          🔢 *Run:* \`#${{ github.run_number }}\`

          📥 [Download & Logs]($REPO_URL)"

          curl -F chat_id="$CHAT_ID" \
               -F document=@"$KERNEL_ZIP" \
               -F caption="$CAPTION" \
               -F parse_mode="Markdown" \
               https://api.telegram.org/bot$BOT_TOKEN/sendDocument
